<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scoreboard</title>
<style>
  :root {
    --bg: #14161a;
    --surface: #1c1f26;
    --surface-hover: #242833;
    --border: #2a2d38;
    --text: #c8ccd4;
    --text-dim: #6b7080;
    --text-bright: #e4e7ee;
    --accent: #7b8ca8;
    --accent-green: #5a9e7c;
    --accent-purple: #8b7dc4;
    --accent-teal: #5b9ea6;
    --accent-warm: #b0896b;
    --accent-rose: #c47b8b;
    --danger: #8b5a5a;
    --radius: 8px;
    --radius-lg: 16px;
    --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    --font-heading: Georgia, "Times New Roman", serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  /* ── nav ───────────────────────────────────── */

  .nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .nav-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--font);
  }
  .nav-back:hover { color: var(--text); border-color: var(--text-dim); }

  .nav-title {
    font-family: var(--font-heading);
    font-size: 18px;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  /* ── cards ─────────────────────────────────── */

  .cards { display: grid; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    cursor: pointer;
    transition: all .25s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .card-basketball { border-left: 3px solid var(--accent-rose); }
  .card-basketball:hover { border-color: var(--accent-rose); border-left-width: 3px; }
  .card-foosball { border-left: 3px solid var(--accent-green); }
  .card-foosball:hover { border-color: var(--accent-green); border-left-width: 3px; }

  .card-cat1 { border-left: 3px solid var(--accent-purple); }
  .card-cat1:hover { border-color: var(--accent-purple); border-left-width: 3px; }
  .card-cat2 { border-left: 3px solid var(--accent-teal); }
  .card-cat2:hover { border-color: var(--accent-teal); border-left-width: 3px; }
  .card-cat3 { border-left: 3px solid var(--accent-rose); }
  .card-cat3:hover { border-color: var(--accent-rose); border-left-width: 3px; }
  .card-cat4 { border-left: 3px solid var(--accent-warm); }
  .card-cat4:hover { border-color: var(--accent-warm); border-left-width: 3px; }

  .card-title {
    font-family: var(--font-heading);
    font-size: 20px;
    color: var(--text-bright);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }

  .card-subtitle {
    font-size: 13px;
    color: var(--text-dim);
  }

  .card-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* ── leaderboard ───────────────────────────── */

  .section-header {
    margin-bottom: 28px;
  }

  .section-header h2 {
    font-family: var(--font-heading);
    font-size: 22px;
    color: var(--text-bright);
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }

  .section-header .rule {
    font-size: 13px;
    color: var(--accent-warm);
    line-height: 1.5;
  }

  .leaderboard {
    list-style: none;
    margin-bottom: 36px;
  }

  .leaderboard li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .leaderboard .rank {
    font-family: var(--font-heading);
    font-size: 16px;
    color: var(--text-dim);
    min-width: 32px;
  }
  .leaderboard li:nth-child(1) .rank { color: var(--accent-warm); }
  .leaderboard li:nth-child(2) .rank { color: var(--accent-teal); }
  .leaderboard li:nth-child(3) .rank { color: var(--accent-purple); }

  .leaderboard .name {
    flex: 1;
    font-size: 15px;
    color: var(--text-bright);
  }

  .leaderboard .score {
    font-family: var(--font-heading);
    font-size: 18px;
    color: var(--text-bright);
    margin-right: 48px;
    min-width: 48px;
    text-align: right;
  }

  .leaderboard .verified {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 72px;
    text-align: right;
  }

  .leaderboard .date {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 88px;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text-dim);
    font-size: 14px;
    font-style: italic;
  }

  /* ── form ──────────────────────────────────── */

  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
  }

  .form-section h3 {
    font-family: var(--font-heading);
    font-size: 16px;
    color: var(--text-bright);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--font);
    transition: border-color .2s ease;
  }
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    transition: all .2s ease;
    letter-spacing: 0.3px;
    width: 100%;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 16px;
    margin-top: 0;
    width: auto;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }

  .form-feedback {
    margin-top: 10px;
    font-size: 13px;
  }
  .form-feedback.success { color: var(--accent-green); }
  .form-feedback.error { color: var(--accent-rose); }

  /* ── player list ───────────────────────────── */

  .player-list { list-style: none; }

  .player-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s ease;
  }
  .player-list li:hover { color: var(--text-bright); }

  .player-list .player-name {
    font-size: 16px;
    color: var(--text-bright);
  }

  .player-list .match-count {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── match history ─────────────────────────── */

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .stat:nth-child(1) { border-top: 2px solid var(--accent-teal); }
  .stat:nth-child(2) { border-top: 2px solid var(--accent-green); }
  .stat:nth-child(3) { border-top: 2px solid var(--accent-rose); }
  .stat:nth-child(4) { border-top: 2px solid var(--accent-purple); }

  .stat-value {
    font-family: var(--font-heading);
    font-size: 22px;
    color: var(--text-bright);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .match-list { list-style: none; margin-bottom: 36px; }

  .match-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .match-result {
    font-family: var(--font-heading);
    font-size: 15px;
    min-width: 56px;
    text-align: center;
    padding: 4px 10px;
    border-radius: var(--radius);
    font-size: 13px;
  }
  .match-result.win { color: var(--accent-green); background: rgba(90,158,124,0.12); }
  .match-result.loss { color: var(--accent-rose); background: rgba(196,123,139,0.12); }
  .match-result.draw { color: var(--accent-teal); background: rgba(91,158,166,0.12); }

  .match-opponent {
    flex: 1;
    font-size: 14px;
    color: var(--text);
  }

  .match-score {
    font-family: var(--font-heading);
    font-size: 15px;
    color: var(--text-bright);
    min-width: 48px;
    text-align: right;
  }

  .match-date {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 88px;
    text-align: right;
  }

  /* ── scoreboard title ──────────────────────── */

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-family: var(--font-heading);
    font-size: 28px;
    color: var(--text-bright);
    letter-spacing: 2px;
    font-weight: normal;
  }

  /* ── footer ────────────────────────────────── */

  .footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── new player inline on match form ───────── */

  .inline-create {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .inline-create .form-group { flex: 1; margin-bottom: 0; }

  .inline-create .btn {
    margin-top: 0;
    width: auto;
    padding: 10px 18px;
    font-size: 13px;
  }

  /* ── responsive ────────────────────────────── */

  @media (max-width: 520px) {
    .container { padding: 24px 14px 60px; }
    .card { padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .leaderboard .verified,
    .leaderboard .date { display: none; }
    .leaderboard .score { margin-right: 16px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const API = "";

/* ── router ───────────────────────────────────────────────────────────────── */

const $ = (sel, el) => (el || document).querySelector(sel);
const $$ = (sel, el) => [...(el || document).querySelectorAll(sel)];
const fmt = (iso) => new Date(iso).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
const esc = (s) => {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
};

function navigate(hash) {
  location.hash = hash;
}

window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", render);

async function render() {
  const hash = location.hash.slice(1) || "home";
  const app = document.getElementById("app");

  if (hash === "home") {
    app.innerHTML = homePage();
    return;
  }

  const [section, ...rest] = hash.split("/");
  const param = rest.join("/");

  if (section === "basketball") {
    if (param) await basketballDetail(app, param);
    else basketballCategories(app);
  }

  if (section === "foosball") {
    if (param) await foosballPlayer(app, param);
    else await foosballHome(app);
  }
}

/* ── home ─────────────────────────────────────────────────────────────────── */

function homePage() {
  return `
    <div class="brand">
      <h1>scoreboard</h1>
    </div>
    <div class="cards">
      <div class="card card-basketball" onclick="navigate('#basketball')">
        <div class="card-title">Basketball</div>
        <div class="card-subtitle">Accuracy &amp; high score records</div>
        <div class="card-meta">4 categories</div>
      </div>
      <div class="card card-foosball" onclick="navigate('#foosball')">
        <div class="card-title">Table Soccer</div>
        <div class="card-subtitle">Match history by player</div>
        <div class="card-meta">Foosball</div>
      </div>
    </div>
    <div class="footer">records of effort</div>
  `;
}

/* ── basketball ───────────────────────────────────────────────────────────── */

function basketballCategories(app) {
  app.innerHTML = `
    <div class="nav">
      <button class="nav-back" onclick="navigate('#home')">&larr; back</button>
      <div class="nav-title">Basketball</div>
    </div>
    <div class="cards">
      <div class="card card-cat1" onclick="navigate('#basketball/1_hand_accuracy')">
        <div class="card-title">1 Hand Accuracy</div>
        <div class="card-subtitle">Consecutive makes, one hand</div>
      </div>
      <div class="card card-cat2" onclick="navigate('#basketball/1_hand_high_score')">
        <div class="card-title">1 Hand High Score</div>
        <div class="card-subtitle">30-second match, one hand</div>
      </div>
      <div class="card card-cat3" onclick="navigate('#basketball/2_hand_accuracy')">
        <div class="card-title">2 Hand Accuracy</div>
        <div class="card-subtitle">Consecutive makes, two hands</div>
      </div>
      <div class="card card-cat4" onclick="navigate('#basketball/2_hand_high_score')">
        <div class="card-title">2 Hand High Score</div>
        <div class="card-subtitle">30-second match, two hands</div>
      </div>
    </div>
  `;
}

async function basketballDetail(app, category) {
  try {
    const cats = await fetch(`${API}/api/basketball/categories`).then(r => r.json());
    const cat = cats.find(c => c.slug === category);
    const records = await fetch(`${API}/api/basketball/records?category=${category}`).then(r => r.json());

    app.innerHTML = `
      <div class="nav">
        <button class="nav-back" onclick="navigate('#basketball')">&larr; back</button>
        <div class="nav-title">${esc(cat ? cat.name : category)}</div>
      </div>
      <div class="section-header">
        <h2>Leaderboard</h2>
        <div class="rule">${esc(cat ? cat.rule : "")}</div>
      </div>
      ${records.length === 0
        ? `<div class="empty-state">no records yet &mdash; be the first</div>`
        : `<ul class="leaderboard">
            ${records.map((r, i) => `
              <li>
                <span class="rank">#${i + 1}</span>
                <span class="name">${esc(r.player_name)}</span>
                <span class="score">${esc(String(r.score))}</span>
                <span class="verified">by ${esc(r.verified_by)}</span>
                <span class="date">${fmt(r.created_at)}</span>
              </li>
            `).join("")}
          </ul>`}
      ${addRecordForm(category)}
    `;
  } catch (err) {
    app.innerHTML = `<div class="empty-state">failed to load: ${esc(err.message)}</div>`;
  }
}

function addRecordForm(category) {
  return `
    <div class="form-section">
      <h3>add record</h3>
      <form onsubmit="submitBasketballRecord(event, '${category}')">
        <div class="form-row">
          <div class="form-group">
            <label>name</label>
            <input type="text" name="player_name" required autocomplete="off">
          </div>
          <div class="form-group">
            <label>score</label>
            <input type="number" name="score" required min="1" autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label>verified by</label>
          <input type="text" name="verified_by" required autocomplete="off">
        </div>
        <button type="submit" class="btn">submit record</button>
        <div class="form-feedback" style="display:none"></div>
      </form>
    </div>
  `;
}

async function submitBasketballRecord(e, category) {
  e.preventDefault();
  const form = e.target;
  const fb = $(".form-feedback", form);
  const btn = $(".btn", form);

  const body = {
    category,
    player_name: form.player_name.value.trim(),
    score: parseInt(form.score.value),
    verified_by: form.verified_by.value.trim(),
  };

  btn.disabled = true;
  btn.textContent = "submitting...";

  try {
    const res = await fetch(`${API}/api/basketball/records`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "failed");
    fb.style.display = "block";
    fb.className = "form-feedback success";
    fb.textContent = "record added";
    form.reset();
    setTimeout(() => navigate(`#basketball/${category}`), 600);
  } catch (err) {
    fb.style.display = "block";
    fb.className = "form-feedback error";
    fb.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "submit record";
  }
}

/* ── foosball ─────────────────────────────────────────────────────────────── */

async function foosballHome(app) {
  try {
    const players = await fetch(`${API}/api/foosball/players`).then(r => r.json());
    app.innerHTML = `
      <div class="nav">
        <button class="nav-back" onclick="navigate('#home')">&larr; back</button>
        <div class="nav-title">Table Soccer</div>
      </div>
      ${players.length === 0
        ? `<div class="empty-state">no players yet</div>`
        : `<ul class="player-list">
            ${players.map(p => `
              <li onclick="navigate('#foosball/${p.id}')">
                <span class="player-name">${esc(p.name)}</span>
                <span class="match-count">${p.match_count} match${p.match_count !== 1 ? "es" : ""}</span>
              </li>
            `).join("")}
          </ul>`}
      <div style="margin-top:24px; text-align:center;">
        <button class="btn-secondary" onclick="showNewPlayerForm()">+ new player</button>
      </div>
      <div id="new-player-form" style="display:none; margin-top:16px;"></div>
    `;
  } catch (err) {
    app.innerHTML = `<div class="empty-state">failed to load: ${esc(err.message)}</div>`;
  }
}

function showNewPlayerForm() {
  const el = document.getElementById("new-player-form");
  el.style.display = "block";
  el.innerHTML = `
    <div class="form-section">
      <h3>new player</h3>
      <form onsubmit="createPlayer(event)">
        <div class="form-group">
          <label>player name</label>
          <input type="text" name="name" required autocomplete="off">
        </div>
        <button type="submit" class="btn">create</button>
        <div class="form-feedback" style="display:none"></div>
      </form>
    </div>
  `;
}

async function createPlayer(e) {
  e.preventDefault();
  const form = e.target;
  const fb = $(".form-feedback", form);
  const btn = $(".btn", form);

  btn.disabled = true;
  btn.textContent = "creating...";

  try {
    const res = await fetch(`${API}/api/foosball/players`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: form.name.value.trim() }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "failed");
    navigate(`#foosball/${data.id}`);
  } catch (err) {
    fb.style.display = "block";
    fb.className = "form-feedback error";
    fb.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "create";
  }
}

async function foosballPlayer(app, playerId) {
  try {
    const [data, players] = await Promise.all([
      fetch(`${API}/api/foosball/players/${playerId}/matches`).then(r => r.json()),
      fetch(`${API}/api/foosball/players`).then(r => r.json()),
    ]);

    if (data.error) throw new Error(data.error);

    const { player, matches, stats } = data;

    app.innerHTML = `
      <div class="nav">
        <button class="nav-back" onclick="navigate('#foosball')">&larr; back</button>
        <div class="nav-title">${esc(player.name)}</div>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value">${stats.total_matches}</div>
          <div class="stat-label">played</div>
        </div>
        <div class="stat">
          <div class="stat-value">${stats.wins}</div>
          <div class="stat-label">wins</div>
        </div>
        <div class="stat">
          <div class="stat-value">${stats.losses}</div>
          <div class="stat-label">losses</div>
        </div>
        <div class="stat">
          <div class="stat-value">${stats.draws}</div>
          <div class="stat-label">draws</div>
        </div>
      </div>

      <div class="section-header">
        <h2>Matches</h2>
      </div>

      ${matches.length === 0
        ? `<div class="empty-state">no matches yet</div>`
        : `<ul class="match-list">
            ${matches.map(m => {
              let cls = "";
              if (m.player_score > m.opponent_score) cls = "win";
              else if (m.player_score < m.opponent_score) cls = "loss";
              else cls = "draw";
              return `
                <li class="match-item">
                  <span class="match-result ${cls}">${cls.toUpperCase()}</span>
                  <span class="match-opponent">vs ${esc(m.opponent)}</span>
                  <span class="match-score">${m.player_score} &ndash; ${m.opponent_score}</span>
                  <span class="match-date">${fmt(m.created_at)}</span>
                </li>
              `;
            }).join("")}
          </ul>`}

      ${addMatchForm(player.id, players)}
    `;
  } catch (err) {
    app.innerHTML = `<div class="empty-state">failed to load: ${esc(err.message)}</div>`;
  }
}

function addMatchForm(playerId, players) {
  const otherPlayers = players.filter(p => p.id !== playerId);
  return `
    <div class="form-section">
      <h3>add match</h3>
      <form onsubmit="submitFoosballMatch(event, ${playerId})">
        <div class="form-group">
          <label>opponent</label>
          <select name="opponent" required>
            <option value="">select opponent...</option>
            ${otherPlayers.map(p => `<option value="${esc(p.name)}">${esc(p.name)}</option>`).join("")}
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>your score</label>
            <input type="number" name="player_score" required min="0" value="0" autocomplete="off">
          </div>
          <div class="form-group">
            <label>opponent score</label>
            <input type="number" name="opponent_score" required min="0" value="0" autocomplete="off">
          </div>
        </div>
        <button type="submit" class="btn">submit match</button>
        <div class="form-feedback" style="display:none"></div>
      </form>
      ${createPlayerInlineSection()}
    </div>
  `;
}

function createPlayerInlineSection() {
  return `
    <div class="inline-create">
      <div class="form-group">
        <label>or create new opponent</label>
        <input type="text" id="inline-new-player" placeholder="new player name" autocomplete="off">
      </div>
      <button type="button" class="btn" onclick="createInlinePlayer()">create</button>
    </div>
  `;
}

async function createInlinePlayer() {
  const input = document.getElementById("inline-new-player");
  const name = input.value.trim();
  if (!name) return;

  const btn = input.nextElementSibling;
  btn.disabled = true;
  btn.textContent = "...";

  try {
    const res = await fetch(`${API}/api/foosball/players`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "failed");
    navigate(`#foosball/${data.id}`);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = "create";
    alert(err.message);
  }
}

async function submitFoosballMatch(e, playerId) {
  e.preventDefault();
  const form = e.target;
  const fb = $(".form-feedback", form);
  const btn = $(".btn", form);

  const body = {
    player_id: playerId,
    opponent: form.opponent.value,
    player_score: parseInt(form.player_score.value),
    opponent_score: parseInt(form.opponent_score.value),
  };

  btn.disabled = true;
  btn.textContent = "submitting...";

  try {
    const res = await fetch(`${API}/api/foosball/matches`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "failed");
    fb.style.display = "block";
    fb.className = "form-feedback success";
    fb.textContent = "match added";
    form.reset();
    setTimeout(() => navigate(`#foosball/${playerId}`), 600);
  } catch (err) {
    fb.style.display = "block";
    fb.className = "form-feedback error";
    fb.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "submit match";
  }
}
</script>
</body>
</html>
